services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: projectcal
      POSTGRES_USER: projectcal
      POSTGRES_PASSWORD: projectcal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: projectcal
      MINIO_ROOT_PASSWORD: projectcal123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: src/ProjectCal.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: Postgres
      ConnectionStrings__Default: ${SUPABASE_DB_CONNECTION_STRING:-Host=postgres;Port=5432;Database=projectcal;Username=projectcal;Password=projectcal}
      Jwt__SigningKey: ${Jwt__SigningKey:-change-this-production-signing-key-32-bytes-minimum}
      Storage__RootPath: /app/App_Data/media
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - api-media:/app/App_Data/media

  worker:
    build:
      context: .
      dockerfile: src/ProjectCal.Worker/Dockerfile
    environment:
      Database__Provider: Postgres
      ConnectionStrings__Default: ${SUPABASE_DB_CONNECTION_STRING:-Host=postgres;Port=5432;Database=projectcal;Username=projectcal;Password=projectcal}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OpenAI__TranscriptionModel: ${OpenAI__TranscriptionModel:-gpt-4o-mini-transcribe}
      Transcription__StubText: Transcription worker processed this audio. Set OPENAI_API_KEY for real speech-to-text.
    depends_on:
      - postgres
      - api

volumes:
  postgres-data:
  minio-data:
  api-media:
