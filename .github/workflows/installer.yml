name: DayScribe Installer

on:
  workflow_dispatch:
  push:
    branches: [main, render-cloud-groq]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build\Build-ExeInstaller.ps1

      - name: Create legacy updater bridge
        shell: powershell
        run: Copy-Item artifacts/installer/output/DayScribeSetup.exe artifacts/installer/output/NotesMuchachosSetup.exe -Force

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: DayScribeSetup
          path: |
            artifacts/installer/output/DayScribeSetup.exe
            artifacts/installer/output/NotesMuchachosSetup.exe

      - name: Publish versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: artifacts/installer/output/DayScribeSetup.exe,artifacts/installer/output/NotesMuchachosSetup.exe
          allowUpdates: true

      - name: Publish latest GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: DayScribe Latest
          commit: ${{ github.sha }}
          artifacts: artifacts/installer/output/DayScribeSetup.exe,artifacts/installer/output/NotesMuchachosSetup.exe
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
