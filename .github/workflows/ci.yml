name: DayScribe CI

on:
  push:
    branches: [main, master, exe-installer]
  pull_request:
    branches: [main, master, exe-installer]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProjectCal.slnx

      - name: Build
        run: dotnet build ProjectCal.slnx --no-restore --configuration Release

      - name: Format check
        run: dotnet format ProjectCal.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test ProjectCal.slnx --no-build --configuration Release --verbosity normal
