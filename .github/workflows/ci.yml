name: ProjectCal CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProjectCal.slnx

      - name: Build
        run: dotnet build ProjectCal.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ProjectCal.slnx --no-build --configuration Release --verbosity normal
